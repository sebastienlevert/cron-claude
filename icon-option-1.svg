<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Clock-gear hybrid: clock face with gear teeth around the rim -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Gear teeth (12 teeth around the circle) -->
  <g fill="url(#grad1)">
    <rect x="58" y="2" width="12" height="16" rx="2" />
    <rect x="58" y="110" width="12" height="16" rx="2" />
    <rect x="2" y="58" width="16" height="12" rx="2" />
    <rect x="110" y="58" width="16" height="12" rx="2" />
    <rect x="18.5" y="18.5" width="12" height="16" rx="2" transform="rotate(45 24.5 26.5)" />
    <rect x="97.5" y="18.5" width="12" height="16" rx="2" transform="rotate(-45 103.5 26.5)" />
    <rect x="18.5" y="93.5" width="12" height="16" rx="2" transform="rotate(-45 24.5 101.5)" />
    <rect x="97.5" y="93.5" width="12" height="16" rx="2" transform="rotate(45 103.5 101.5)" />
  </g>

  <!-- Outer circle -->
  <circle cx="64" cy="64" r="44" fill="url(#grad1)" />

  <!-- Inner clock face -->
  <circle cx="64" cy="64" r="38" fill="white" />

  <!-- Hour markers -->
  <g stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round">
    <line x1="64" y1="30" x2="64" y2="36" />
    <line x1="64" y1="92" x2="64" y2="98" />
    <line x1="30" y1="64" x2="36" y2="64" />
    <line x1="92" y1="64" x2="98" y2="64" />
  </g>

  <!-- Small hour dots -->
  <g fill="#c7d2fe">
    <circle cx="81" cy="34.5" r="2" />
    <circle cx="93.5" cy="47" r="2" />
    <circle cx="93.5" cy="81" r="2" />
    <circle cx="81" cy="93.5" r="2" />
    <circle cx="47" cy="93.5" r="2" />
    <circle cx="34.5" cy="81" r="2" />
    <circle cx="34.5" cy="47" r="2" />
    <circle cx="47" cy="34.5" r="2" />
  </g>

  <!-- Clock hands -->
  <!-- Hour hand (pointing to ~10) -->
  <line x1="64" y1="64" x2="48" y2="42" stroke="#4f46e5" stroke-width="4" stroke-linecap="round" />
  <!-- Minute hand (pointing to ~2) -->
  <line x1="64" y1="64" x2="80" y2="38" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round" />

  <!-- Center dot -->
  <circle cx="64" cy="64" r="3.5" fill="#4f46e5" />
  <circle cx="64" cy="64" r="1.5" fill="white" />
</svg>
